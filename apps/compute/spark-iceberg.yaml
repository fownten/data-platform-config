apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-iceberg
  namespace: data-layer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
  template:
    metadata:
      labels:
        app: spark
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1" # This makes DNS resolution 10x faster for external-ish names
      containers:
      - name: spark
        image: fownten/spark-iceberg:3.5.0_1.4.2
        ports:
          - containerPort: 8000 # spark master ui
          - containerPort: 10000 # SQL / Thrift server
        env:
          # point spark to our minio s3
          - name: AWS_ACCESS_KEY_ID
            value: "admin"
          - name: AWS_SECRET_ACCESS_KEY
            value: "password123"
          - name: AWS_REGION
            value: "us-east-1"
          - name: SPARK_CONF_spark_sql_catalog_nessie
            value: "org.apache.iceberg.spark.SparkCatalog"
          - name: SPARK_CONF_spark_sql_catalog_nessie_catalog-impl
            value: "org.apache.iceberg.nessie.NessieCatalog"
          - name: SPARK_CONF_spark_sql_catalog_nessie_uri
            value: "http://nessie.data-layer.svc.cluster.local:19120/api/v1"
          - name: SPARK_CONF_spark_sql_catalog_nessie_ref
            value: "main"
          - name: SPARK_CONF_spark_sql_catalog_nessie_warehouse
            value: "s3a://warehouse/iceberg"
          - name: SPARK_CONF_spark_sql_default_catalog
            value: "nessie"
