apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino-engine
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://trinodb.github.io/charts/
    chart: trino
    targetRevision: 0.23.0
    helm:
      values: |
        additionalCatalogs:
          nessie: |
            connector.name=iceberg
            iceberg.catalog.type=nessie
            iceberg.nessie.uri=http://nessie.internal:19120/api/v1
            iceberg.nessie.ref=main
            hive.s3.endpoint=http://minio.internal:9000
            hive.s3.aws-access-key=admin
            hive.s3.aws-secret-key=password123
            hive.s3.path-style-access=true
            hive.s3.ssl.enabled=false
  destination:
    server: https://kubernetes.default.svc
    namespace: gold-layer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
