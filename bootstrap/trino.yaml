apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino-engine
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://trinodb.github.io/charts/
    chart: trino
    targetRevision: 0.23.0
    helm:
      values: |
        image:
          pullSecrets: []
        additionalCatalogs:
          nessie: |
            connector.name=iceberg
            iceberg.catalog.type=nessie
            iceberg.nessie-catalog.uri=http://10.96.3.204:19120/api/v1
            iceberg.nessie-catalog.default-warehouse-dir=s3a://warehouse/iceberg
            iceberg.nessie-catalog.ref=main
            fs.native-s3.enabled=true
            s3.endpoint=http://10.96.166.39:9000
            s3.aws-access-key=admin
            s3.aws-secret-key=password123
            s3.path-style-access=true
  destination:
    server: https://kubernetes.default.svc
    namespace: gold-layer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
