apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-compute
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fownten/data-platform-config.git
    targetRevision: HEAD
    path: apps/compute
  destination:
    server: https://kubernetes.default.svc
    namespace: data-layer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
