apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboard-layer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 7.0.0
  destination:
    server: https://kubernetes.default.svc
    namespace: gold-layer
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
